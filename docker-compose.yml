services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=bot_user
      - POSTGRES_PASSWORD=bot_password
      - POSTGRES_DB=voice_notes_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot_user -d voice_notes_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: taskiq worker src.tasks.broker:broker src.tasks.tasks --workers 1 --max-async-tasks 3
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DB_URL=postgresql+asyncpg://bot_user:bot_password@db:5432/voice_notes_db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BOT_TOKEN=${BOT_TOKEN}
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: python src/bot/main.py
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - REDIS_URL=redis://redis:6379/0
      - DB_URL=postgresql+asyncpg://bot_user:bot_password@db:5432/voice_notes_db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata: